name: AI Terminal Pro CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-terminal-pro-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: ai-terminal-pro-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: AI Terminal Pro v${{ github.run_number }}
          body: |
            ## AI Terminal Pro v${{ github.run_number }}
            
            ### Features
            - Proot Linux terminal
            - AI Agent with streaming responses
            - Split view: Chat + Terminal
            - Secure API key storage
            
            ### Download
            - Install the APK on your ARM64 Android phone
          files: |
            app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
