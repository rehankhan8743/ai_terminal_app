name: ai_terminal_pro
description: A production-ready AI Proot Terminal.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  xterm: ^4.0.0
  flutter_chat_ui: ^1.6.10
  flutter_chat_types: ^3.6.2
  dio: ^5.4.0
  provider: ^6.1.1
  path_provider: ^2.1.2
  archive: ^3.4.10
  flutter_secure_storage: ^9.0.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/rootfs.tar.gz
